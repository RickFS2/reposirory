<div class="header">
    <h1>Dashboard Geral</h1>
    <span id="clock"></span>
</div>

<div class="cards">
    <div class="card">
        <h3>Pessoas Detectadas Hoje</h3>
        <p id="pessoas">0</p>
    </div>

    <div class="card">
        <h3>Conformidade (%)</h3>
        <p class="status-ok" id="conformidade">0%</p>
    </div>

    <div class="card">
        <h3>Sem EPI</h3>
        <p class="status-alert" id="semEpi">0</p>
    </div>

    <div class="card">
        <h3>Câmeras Ativas</h3>
        <p class="status-ok">4 Online</p>
    </div>
</div>

<div class="section">
    <h2>🚨 Alertas em Tempo Real</h2>
    <div id="alertas"></div>
</div>

<div class="section">
    <h2>📋 Últimos Registros</h2>
    <table class="table">
        <thead>
            <tr>
                <th>Funcionário</th>
                <th>Área</th>
                <th>Status</th>
                <th>Horário</th>
            </tr>
        </thead>
        <tbody id="tabelaRegistros"></tbody>
    </table>
</div>
